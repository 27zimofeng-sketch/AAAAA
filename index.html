<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ada | Web Developer Portfolio</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>

    <nav class="navbar">
        <div class="logo">ADA_DEV</div>
        <ul class="nav-links">
            <li><a href="#about">About</a></li>
            <li><a href="#projects">Projects</a></li>
            <li><a href="#resources">Resources</a></li>
            <li><a href="#games">Games</a></li>
        </ul>
    </nav>

    <header id="about" class="header">
        <div class="header-content">
            <img src="ada-photo.jpg" alt="Ada" class="profile-pic">
            <h1>I AM <span class="highlight">ADA</span></h1>
            <p>Crafting high-performance web apps with Vanilla HTML, CSS, & JS.</p>
        </div>
    </header>

    <section id="projects" class="section">
        <h2>Project Demonstrations</h2>
        <div id="project-list" class="grid">
            </div>
    </section>

    <section id="resources" class="section bg-light-blue">
        <h2>Upload Resources</h2>
        <div class="upload-container">
            <input type="file" id="fileInput">
            <button onclick="uploadFile()" class="btn">Upload File</button>
            <ul id="fileList"></ul>
        </div>
    </section>

    <section id="games" class="section">
        <h2>Mini Games</h2>
        <div class="game-area">
            <p>Catch the blue square!</p>
            <div id="game-target" onclick="scorePoint()">0</div>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
